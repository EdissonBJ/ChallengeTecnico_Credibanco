server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:paymentdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: password

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

app:
  jwt:
    secret: 5b6f8e3a7c9d4f2e1b8a6c3d0e9f7a2b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f
    expiration-ms: 86400000  # 24 hours

logging:
  level:
    com.challenge.payment: DEBUG
    org.springframework.security: INFO
